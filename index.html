<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DSA Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --marine:#081581; --navy:#050D57; --charcoal:#3C454E;
    --execute:#1742F6; --win:#00B6C3; --plan:#C200CC; --analyze:#6D18F1;
    --sev1:#7C0083; --sev2:#C200CC; --sev3:#DA6BE0; --sev4:#EFC2F2;
    --paper:#F4F6F7; --card:#FFFFFF; --line:#E3E7EA; --ink:#1B2A33;
    --muted:#5E7180; --faint:#8A99A4; --grid:#EDF1F3; --done:#C7D0D6;
    --radius:14px; --shadow:0 1px 2px rgba(0,32,48,.04),0 8px 24px rgba(0,32,48,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-variant-numeric:tabular-nums;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px 72px;}
  .topbar{background:var(--marine);color:#fff;}
  .topbar-in{max-width:1180px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;gap:18px;}
  .brand{font-weight:800;font-size:22px;letter-spacing:-.5px;}
  .brand .dot{color:#5FE0EC;}
  .topbar .divider{width:1px;height:22px;background:rgba(255,255,255,.25);}
  .topbar .sub{font-weight:500;font-size:14px;color:rgba(255,255,255,.82);}
  .topbar .spacer{flex:1}
  .topbar .asof{font-size:12.5px;color:rgba(255,255,255,.7);font-weight:500;}
  .hero{background:linear-gradient(160deg,var(--navy),var(--marine) 70%);color:#fff;
    border-radius:var(--radius);margin-top:26px;padding:30px 32px;box-shadow:var(--shadow);
    display:grid;grid-template-columns:1.35fr 1fr;gap:36px;align-items:center;}
  .eyebrow{text-transform:uppercase;letter-spacing:.18em;font-size:11px;font-weight:700;color:#5FE0EC;margin:0 0 10px;}
  .hero h1{margin:0 0 6px;font-size:30px;line-height:1.12;font-weight:800;letter-spacing:-.6px;}
  .hero p.lede{margin:0;color:rgba(255,255,255,.8);font-size:14.5px;max-width:48ch;}
  .readout{display:flex;align-items:baseline;gap:14px;margin:20px 0 12px;}
  .readout .big{font-size:58px;font-weight:800;letter-spacing:-2px;line-height:1;}
  .readout .big small{font-size:26px;font-weight:700;opacity:.6;margin-left:2px;}
  .readout .rlabel{font-size:13px;color:rgba(255,255,255,.78);max-width:18ch;}
  .meter .track{display:flex;height:16px;border-radius:9px;overflow:hidden;background:rgba(255,255,255,.12);}
  .meter .seg{height:100%;transition:width .8s cubic-bezier(.22,.61,.36,1);}
  .meter .legend{display:flex;flex-wrap:wrap;gap:14px 20px;margin-top:14px;}
  .meter .lg{display:flex;align-items:center;gap:8px;font-size:12.5px;color:rgba(255,255,255,.85);}
  .meter .sw{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .alertcard{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:20px 22px;}
  .alertcard h3{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.7);font-weight:700;}
  .alertrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid rgba(255,255,255,.1);}
  .alertrow:first-of-type{border-top:none;}
  .alertrow .n{font-size:26px;font-weight:800;letter-spacing:-1px;}
  .alertrow .k{font-size:13px;color:rgba(255,255,255,.82);display:flex;align-items:center;gap:9px;}
  .pip{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-top:16px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow);}
  .kpi .n{font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--marine);}
  .kpi .l{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;line-height:1.25;}
  .kpi .bar{height:3px;border-radius:2px;background:var(--grid);margin-top:10px;overflow:hidden;}
  .kpi .bar i{display:block;height:100%;border-radius:2px;}
  .lb{display:flex;flex-direction:column;gap:11px;}
  .lbrow{display:flex;align-items:center;gap:14px;}
  .medal{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;background:#B7C0C8;}
  .medal.g{background:linear-gradient(145deg,#F6D861,#D4AF37);color:#5c4a00;box-shadow:0 2px 7px rgba(212,175,55,.45);}
  .medal.s{background:linear-gradient(145deg,#DBE1E7,#AAB4BD);color:#39434c;box-shadow:0 2px 7px rgba(170,180,189,.45);}
  .medal.b{background:linear-gradient(145deg,#E3924F,#C2792F);color:#3f2400;box-shadow:0 2px 7px rgba(194,121,47,.4);}
  .lbrow .nm{width:170px;flex:none;font-weight:600;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lbrow .tr{flex:1;background:var(--grid);border-radius:7px;height:16px;overflow:hidden;}
  .lbrow .tr i{display:block;height:100%;border-radius:7px;background:var(--marine);transition:width .8s cubic-bezier(.22,.61,.36,1);}
  .lbrow.g .tr i{background:linear-gradient(90deg,#EBC63A,#D4AF37);}
  .lbrow.s .tr i{background:linear-gradient(90deg,#C7CFD6,#AAB4BD);}
  .lbrow.b .tr i{background:linear-gradient(90deg,#DA8B4C,#C2792F);}
  .lbrow .ct{width:38px;text-align:right;font-weight:800;color:var(--marine);flex:none;font-size:15px;}
  .lbrow.zero .nm,.lbrow.zero .ct{color:var(--faint);}
  .stat3{display:flex;gap:30px;margin-bottom:16px;flex-wrap:wrap;}
  .stat3 .s .n{font-size:26px;font-weight:800;color:var(--marine);letter-spacing:-1px;line-height:1;}
  .stat3 .s .l{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:4px;}
  .agewrap{max-height:330px;overflow:auto;border:1px solid var(--grid);border-radius:10px;}
  .agewrap table{font-size:12.5px;}
  .agewrap thead th{position:sticky;top:0;background:#fff;z-index:1;padding:9px 10px;border-bottom:2px solid var(--line);}
  .days-pill{font-weight:800;color:var(--marine);white-space:nowrap;}
  .spd{display:flex;align-items:flex-end;gap:12px;height:196px;padding:8px 4px 0;}
  .spd .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;min-width:0;}
  .spd .tot{font-size:12px;font-weight:800;color:var(--marine);margin-bottom:5px;}
  .spd .stack{width:100%;max-width:54px;display:flex;flex-direction:column;border-radius:6px 6px 0 0;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.07);}
  .spd .seg{width:100%;min-height:2px;}
  .spd .xl{font-size:11px;color:var(--muted);margin-top:9px;text-align:center;white-space:nowrap;}
  .spdleg{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:16px;font-size:12px;color:var(--muted);}
  .spdleg .k{display:inline-flex;align-items:center;gap:7px;}
  .spdleg .sw{width:11px;height:11px;border-radius:3px;}
  .cyc{position:relative;height:190px;display:flex;align-items:flex-end;gap:14px;padding:6px 4px 0;margin-bottom:2px;}
  .cyc::before{content:'';position:absolute;left:0;right:0;top:6px;bottom:0;
    background-image:repeating-linear-gradient(to top, var(--grid) 0, var(--grid) 1px, transparent 1px, transparent 25%);pointer-events:none;}
  .cyc .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;z-index:1;min-width:0;}
  .cyc .bar{width:62%;max-width:52px;border-radius:6px 6px 0 0;transition:height .8s cubic-bezier(.22,.61,.36,1);}
  .cyc .n{font-size:12.5px;font-weight:800;color:var(--marine);margin-bottom:7px;}
  .cyc .xl{font-size:11px;color:var(--muted);margin-top:9px;text-align:center;white-space:nowrap;}
  .hstack{display:flex;flex-direction:column;gap:12px;}
  .hrow{display:grid;grid-template-columns:74px 1fr 34px;align-items:center;gap:10px;}
  .hrow .hlab{font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;}
  .hrow .htrack{position:relative;height:20px;background:var(--grid);border-radius:5px;overflow:hidden;display:flex;}
  .hrow .htrack::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(to right, rgba(0,0,0,.06) 0, rgba(0,0,0,.06) 1px, transparent 1px, transparent 25%);pointer-events:none;}
  .hrow .hseg{height:100%;}
  .hrow .htot{font-size:12.5px;font-weight:800;color:var(--marine);text-align:right;}
  .hsevleg{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:14px;font-size:12px;color:var(--muted);}
  .hsevleg .k{display:inline-flex;align-items:center;gap:7px;}
  .hsevleg .sw{width:11px;height:11px;border-radius:3px;}
  .ctip{position:fixed;display:none;z-index:9999;pointer-events:none;background:var(--navy);color:#fff;
    border-radius:10px;padding:11px 13px;font-size:12.5px;line-height:1.6;box-shadow:0 8px 24px rgba(0,20,40,.28);max-width:250px;}
  .ctip .tt{font-weight:800;margin-bottom:6px;color:#fff;}
  .ctip .tl{display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .ctip .tl b{margin-left:auto;padding-left:14px;}
  .ctip .tsw{width:9px;height:9px;border-radius:3px;flex:none;}
  .ctip .ttot{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.2);font-weight:700;}
  [data-tip]{cursor:default;}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);font-weight:700;margin:34px 0 14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);}
  .panel .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .panel h3{margin:0 0 3px;font-size:16px;font-weight:700;letter-spacing:-.2px;}
  .panel .cap{margin:0 0 18px;font-size:12.5px;color:var(--faint);}
  .donut-wrap{display:flex;gap:26px;align-items:center;}
  .donut{position:relative;flex:0 0 auto;}
  .donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .donut .ctr b{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--marine);line-height:1;}
  .donut .ctr span{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
  .dlegend{flex:1;display:flex;flex-direction:column;gap:9px;}
  .dlegend .row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .dlegend .row .sw{width:11px;height:11px;border-radius:3px;}
  .dlegend .row .lab{flex:1;color:var(--ink);}
  .dlegend .row .v{font-weight:700;color:var(--marine);}
  .dlegend .row .pct{color:var(--faint);font-size:11.5px;width:38px;text-align:right;}
  .bars{display:flex;flex-direction:column;gap:11px;}
  .brow .top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:5px;}
  .brow .top .lab{color:var(--ink);}
  .brow .top .val{font-weight:700;color:var(--marine);font-size:12.5px;white-space:nowrap;}
  .brow .top .val .mut{color:var(--faint);font-weight:600;}
  .track{background:var(--grid);border-radius:6px;height:9px;overflow:hidden;display:flex;}
  .track i{display:block;height:100%;transition:width .8s cubic-bezier(.22,.61,.36,1);}
  .track i.open{background:var(--marine);}
  .track i.done{background:var(--done);}
  .sevrow{display:grid;grid-template-columns:118px 1fr 96px;align-items:center;gap:12px;margin-bottom:12px;}
  .sevrow .name{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .sevrow .name .sw{width:12px;height:12px;border-radius:3px;flex:none;}
  .sevrow .track{height:16px;}
  .sevrow .cnt{font-size:12px;color:var(--muted);text-align:right;white-space:nowrap;}
  .sevrow .cnt b{color:var(--plan);font-size:13px;}
  .legend-mini{font-size:11.5px;color:var(--faint);margin-top:14px;}
  .legend-mini .sw{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin:0 4px 0 0;}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:none;}
  .toggle button{border:none;background:#fff;padding:4px 10px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;}
  .toggle button.active{background:var(--marine);color:#fff;}
  .itrow{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:13px;}
  .itrow .lab{width:150px;flex:none;color:var(--ink);font-weight:600;}
  .itrow .t{flex:1;background:var(--grid);border-radius:6px;height:14px;overflow:hidden;}
  .itrow .t i{display:block;height:100%;background:var(--execute);border-radius:6px;}
  .itrow .n{width:34px;text-align:right;font-weight:800;color:var(--marine);}
  .itrow.future .t i{background:var(--analyze);}
  .futrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--grid);font-size:13px;}
  .futrow:first-child{border-top:none;}
  .futrow .wi{flex:1;color:var(--ink);}
  .futrow .ow{color:var(--faint);font-size:12px;white-space:nowrap;}
  .recentrow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-top:1px solid var(--grid);font-size:13px;}
  .recentrow:first-child{border-top:none;}
  .recentrow .d{color:var(--win);font-weight:700;flex:none;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;padding:0 12px 10px;border-bottom:2px solid var(--line);}
  thead th.sortable{cursor:pointer;user-select:none;}
  thead th.sortable:hover{color:var(--marine);}
  thead th .arw{font-size:9px;opacity:.6;margin-left:3px;}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--grid);vertical-align:middle;}
  tbody tr:hover{background:#FAFCFD;}
  .wicell{font-weight:600;color:var(--ink);}
  .wicell a{color:inherit;text-decoration:none;}
  .wicell a:hover{color:var(--marine);text-decoration:underline;}
  .wicell a .ext{font-size:11px;opacity:.55;text-decoration:none;}
  .ownertbl th.num,.ownertbl td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .ownertbl td.tot,.ownertbl th.num:last-child{font-weight:800;color:var(--marine);}
  .ownertbl tfoot td{border-top:2px solid var(--line);border-bottom:none;font-weight:800;background:#FAFCFD;}
  .ownertbl tfoot td.tot{color:var(--marine);}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;background:#EEF3F6;}
  .tag .pip{width:7px;height:7px;}
  .sev-badge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;color:#fff;}
  .owner{color:var(--muted);}
  .owner.none{color:var(--faint);font-style:italic;}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:2px 0 16px;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 13px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;}
  .chip.active{background:var(--marine);border-color:var(--marine);color:#fff;}
  .tdiv{width:1px;height:20px;background:var(--line);margin:0 2px;}
  select.sel{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12.5px;color:var(--ink);background:#fff;}
  .cnote{font-size:12px;color:var(--faint);margin-left:auto;}
  .note{display:flex;gap:12px;align-items:flex-start;background:#FCF3F9;border:1px solid #F0D4E7;border-left:3px solid var(--plan);border-radius:10px;padding:14px 16px;margin-top:16px;font-size:13px;color:#5a3350;}
  .note b{color:var(--plan);}
  .banner{border-radius:10px;padding:11px 15px;font-size:13px;font-weight:600;margin:22px 0 -4px;}
  .banner.ph{background:#FFF4D6;color:#7a5b00;border:1px solid #F0D48A;}
  .banner.err{background:#FDE7EF;color:#8a0043;border:1px solid #F3B6cf;}
  footer{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:8px 18px;align-items:center;font-size:12px;color:var(--faint);}
  footer a{color:var(--muted);text-decoration:none;font-weight:600;}
  footer .spacer{flex:1}
  @media (max-width:900px){.hero{grid-template-columns:1fr;gap:24px;padding:24px;}.kpis{grid-template-columns:repeat(2,1fr);}.grid2{grid-template-columns:1fr;}.readout .big{font-size:48px;}}
</style>
</head>
<body>
  <div class="topbar"><div class="topbar-in">
    <div class="brand">Deltek<span class="dot">.</span></div>
    <div class="divider"></div>
    <div class="sub">DSA Dashboard</div>
    <div class="spacer"></div>
    <div class="asof" id="asof">Loading…</div>
  </div></div>
  <div class="wrap">
    <div id="banner"></div>
    <div id="app"></div>
  </div>
  <div id="ctip" class="ctip"></div>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const C = {marine:'#081581',execute:'#1742F6',win:'#00B6C3',plan:'#C200CC',analyze:'#6D18F1',notstarted:'#CDD3D8'};
const STATUS_COLOR = {"Complete":C.win,"Re-open":C.plan,"In progress":C.execute,"Re-test":C.analyze,"Working as designed":'#9AA3AB',"Not started":C.notstarted};
const SEV_COLOR = {"S1 · Mission critical":'#7C0083',"S2 · Critical":'#C200CC',"S3 · Elevated":'#DA6BE0',"S4 · General":'#EFC2F2',"Unspecified":'#C4CDD3'};
const SEVK = {"S1":0,"S2":1,"S3":2,"S4":3,"—":4};
const SEV_BADGE = {"S1":["#7C0083","#fff"],"S2":["#C200CC","#fff"],"S3":["#DA6BE0","#fff"],"S4":["#EFC2F2","#7A2F80"],"—":["#C4CDD3","#3C454E"]};
let D=null, barSort='open', punch={sevSet:new Set(),statusSet:new Set(),ownerSet:new Set(),key:'sev',dir:1}, TIPS={};
(function(){
  const tip=document.getElementById('ctip');
  document.addEventListener('mousemove', e=>{
    const el = e.target.closest('[data-tip]');
    if(!el || !TIPS[el.dataset.tip]){ tip.style.display='none'; return; }
    tip.innerHTML = TIPS[el.dataset.tip];
    tip.style.display='block';
    const pad=16, vw=window.innerWidth, vh=window.innerHeight;
    const w=tip.offsetWidth, h=tip.offsetHeight;
    let x=e.clientX+pad, y=e.clientY+pad;
    if(x+w>vw-8) x=e.clientX-w-pad;
    if(y+h>vh-8) y=e.clientY-h-pad;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  });
  document.addEventListener('mouseleave', ()=>{ tip.style.display='none'; });
})();

function donut(status){
  const total = status.reduce((a,b)=>a+b.count,0)||1;
  const size=168,sw=26,r=(size-sw)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  let off=0, segs='';
  status.forEach(s=>{const len=s.count/total*circ;
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${STATUS_COLOR[s.label]||'#C4CDD3'}" stroke-width="${sw}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"><title>${esc(s.label)}: ${s.count}</title></circle>`;
    off+=len;});
  const done = status.find(s=>s.label==='Complete');
  const openCount = total - (done?done.count:0);
  const leg = status.map(s=>`<div class="row"><span class="sw" style="background:${STATUS_COLOR[s.label]||'#C4CDD3'}"></span><span class="lab">${esc(s.label)}</span><span class="v">${s.count}</span><span class="pct">${Math.round(s.count/total*100)}%</span></div>`).join('');
  return `<div class="donut-wrap"><div class="donut" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EDF1F3" stroke-width="${sw}"></circle>${segs}</svg>
    <div class="ctr"><b>${openCount}</b><span>open items</span></div>

function renderOpenToolbar(){
  const statuses=[...new Set(D.openItems.map(r=>r.status))];
  const ownerCounts={}; D.openItems.forEach(r=>ownerCounts[r.owner]=(ownerCounts[r.owner]||0)+1);
  const owners=[...new Set(D.openItems.map(r=>r.owner))].sort((a,b)=>ownerCounts[b]-ownerCounts[a]);
  const sevChips=['S1','S2','S3','S4'].map(v=>`<span class="chip ${punch.sevSet.has(v)?'active':''}" data-sev="${v}">${v}</span>`).join('');
  const statusChips=statuses.map(s=>`<span class="chip ${punch.statusSet.has(s)?'active':''}" data-status="${esc(s)}">${esc(s)}</span>`).join('');
  const ownerChips=owners.map(o=>`<span class="chip ${punch.ownerSet.has(o)?'active':''}" data-owner="${esc(o)}">${esc(o)}</span>`).join('');
  $('#oiToolbar').innerHTML = `<span class="chip ${punch.sevSet.size===0?'active':''}" data-sevall="1">All</span>${sevChips}
    <span class="tdiv"></span>
    <span class="chip ${punch.statusSet.size===0?'active':''}" data-statusall="1">All statuses</span>${statusChips}
    <span class="tdiv"></span>
    <span class="chip ${punch.ownerSet.size===0?'active':''}" data-ownerall="1">All owners</span>${ownerChips}
    <span class="cnote" id="punchCount"></span>`;
  $('#oiToolbar').querySelectorAll('[data-sev]').forEach(c=>c.onclick=()=>{const v=c.dataset.sev;
    punch.sevSet.has(v)?punch.sevSet.delete(v):punch.sevSet.add(v); refreshOpenItems();});
  $('#oiToolbar').querySelector('[data-sevall]').onclick=()=>{punch.sevSet.clear(); refreshOpenItems();};
  $('#oiToolbar').querySelectorAll('[data-status]').forEach(c=>c.onclick=()=>{const v=c.dataset.status;
    punch.statusSet.has(v)?punch.statusSet.delete(v):punch.statusSet.add(v); refreshOpenItems();});
  $('#oiToolbar').querySelector('[data-statusall]').onclick=()=>{punch.statusSet.clear(); refreshOpenItems();};
  $('#oiToolbar').querySelectorAll('[data-owner]').forEach(c=>c.onclick=()=>{const v=c.dataset.owner;
    punch.ownerSet.has(v)?punch.ownerSet.delete(v):punch.ownerSet.add(v); refreshOpenItems();});
  $('#oiToolbar').querySelector('[data-ownerall]').onclick=()=>{punch.ownerSet.clear(); refreshOpenItems();};
}
function refreshOpenItems(){ renderOpenToolbar(); openItemsRows(); }
function wire(){
  document.querySelectorAll('#critHead th.sortable').forEach(th=>th.onclick=()=>{const kk=th.dataset.k;
    if(punch.key===kk)punch.dir*=-1; else {punch.key=kk;punch.dir=1;} openItemsRows();});
}
D=null;
const DATA_URL='https://raw.githubusercontent.com/jedortega-deltek/DSA-Dashboard/main/data.json';
const bust=u=>u+(u.includes('?')?'&':'?')+'cb='+Date.now();
const tryLoad=u=>fetch(bust(u)).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});
tryLoad(DATA_URL)
  .catch(()=>tryLoad('./data.json'))
  .then(d=>{D=d;D.app=$('#app');render();})
  .catch(e=>{$('#asof').textContent='Data unavailable';
    $('#banner').innerHTML=`<div class="banner err">Couldn't load <code>data.json</code> from GitHub (${esc(e.message)}). Check that the repo is public and the file exists at main/data.json.</div>`;});
</script>
</body>
</html>
