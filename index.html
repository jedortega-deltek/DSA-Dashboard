<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DSA Dashboard</title>
<style>
  :root{
    --marine:#081581; --navy:#050D57; --blue:#1742F6; --teal:#00B6C3;
    --magenta:#C200CC; --purple:#6D18F1; --charcoal:#3C454E;
    --ink:#20272E; --muted:#5A6570; --faint:#8A929A;
    --grid:#EDF1F3; --line:#E3E7EA; --card:#FFFFFF; --bg:#F4F6F8; --dot:#5FE0EC;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:"Figtree",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px 56px;}
  /* header */
  header{background:var(--marine);color:#fff;margin-bottom:22px;}
  .hbar{max-width:1120px;margin:0 auto;padding:22px 20px;display:flex;
        align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .brand{font-size:30px;font-weight:800;letter-spacing:-.5px;}
  .brand .d{color:var(--dot);}
  .brand .sub{display:block;font-size:12px;font-weight:600;letter-spacing:2px;
              color:#B9C2E8;margin-top:2px;}
  .htitle{font-size:22px;font-weight:700;text-align:right;}
  .htitle .stamp{display:block;font-size:12px;font-weight:500;color:#B9C2E8;margin-top:4px;}
  .accent{height:5px;background:linear-gradient(90deg,var(--teal) 0 25%,var(--blue) 25% 50%,var(--magenta) 50% 75%,var(--purple) 75% 100%);}
  /* placeholder / error banners */
  .note{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:18px;}
  .note.ph{background:#FFF4D6;color:#7a5b00;border:1px solid #F0D48A;}
  .note.err{background:#FDE7EF;color:#8a0043;border:1px solid #F3B6cf;}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
  .card h2{margin:0 0 14px;font-size:13px;font-weight:700;letter-spacing:.6px;
           text-transform:uppercase;color:var(--muted);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .grid-hero{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-bottom:18px;}
  section{margin-bottom:18px;}
  @media(max-width:820px){.grid2,.grid-hero{grid-template-columns:1fr;}}
  /* hero readiness */
  .big{font-size:56px;font-weight:800;line-height:1;color:var(--marine);}
  .big span{font-size:22px;color:var(--muted);font-weight:700;}
  .barout{height:14px;border-radius:8px;background:var(--grid);overflow:hidden;margin:16px 0 8px;}
  .barin{height:100%;background:var(--teal);border-radius:8px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;font-size:12.5px;color:var(--muted);}
  .legend .k{display:inline-flex;align-items:center;gap:6px;}
  .legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block;}
  /* attention */
  .att{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media(max-width:640px){.att{grid-template-columns:repeat(2,1fr);}}
  .att .cell{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;}
  .att .n{font-size:30px;font-weight:800;line-height:1;}
  .att .l{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
  .att .crit .n{color:var(--magenta);}
  .att .warn .n{color:var(--purple);}
  .att .mut .n{color:var(--marine);}
  /* kpi strip */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  @media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr);}}
  .kpi{padding:12px 6px;text-align:center;border-right:1px solid var(--line);}
  .kpi:last-child{border-right:none;}
  .kpi .n{font-size:26px;font-weight:800;color:var(--marine);}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:4px;font-weight:600;}
  /* bars */
  .row{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px;}
  .row .lab{width:180px;flex:none;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row .track{flex:1;background:var(--grid);border-radius:6px;height:20px;position:relative;overflow:hidden;}
  .row .fill{height:100%;border-radius:6px;}
  .row .fill.open{position:absolute;top:0;left:0;background:var(--magenta);opacity:.9;}
  .row .fill.tot{background:var(--marine);}
  .row .val{width:66px;flex:none;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;}
  @media(max-width:640px){.row .lab{width:120px;}}
  /* donut */
  .donutwrap{display:flex;align-items:center;gap:18px;}
  .donut{flex:none;}
  .dlegend{font-size:13px;}
  .dlegend .k{display:flex;align-items:center;gap:8px;margin:6px 0;}
  .dlegend .sw{width:12px;height:12px;border-radius:3px;}
  .dlegend .c{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums;padding-left:14px;}
  /* tables / lists */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);}
  td.sev{font-weight:800;}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .s1{background:#7C0083;color:#fff;} .s2{background:var(--magenta);color:#fff;}
  .recent li{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .recent li .d{color:var(--teal);font-weight:700;font-variant-numeric:tabular-nums;flex:none;}
  ul.recent{list-style:none;margin:0;padding:0;}
  footer{margin-top:26px;font-size:12px;color:var(--faint);text-align:center;}
  footer a{color:var(--marine);text-decoration:none;font-weight:600;}
  h2 .hint{font-weight:600;color:var(--faint);text-transform:none;letter-spacing:0;font-size:11px;}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="brand">Deltek<span class="d">.</span>
      <span class="sub">DSA DASHBOARD</span></div>
    <div class="htitle">Launch Readiness
      <span class="stamp" id="stamp">Loading…</span></div>
  </div>
</header>
<div class="accent"></div>

<div class="wrap">
  <div id="banner"></div>
  <div id="app"></div>
</div>

<script>
const C = {
  status:{"Complete":"#00B6C3","In progress":"#1742F6","Re-test":"#6D18F1",
          "Working as designed":"#9AA3AB","Not started":"#CDD3D8"},
  sev:{"S1 · Mission critical":"#7C0083","S2 · Critical":"#C200CC",
       "S3 · Elevated":"#DA6BE0","S4 · General":"#EFC2F2","Unspecified":"#C4CDD3"},
};
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function bars(items, colorFn){
  const max = Math.max(1, ...items.map(i=>i.total));
  return items.map(i=>{
    const totPct = i.total/max*100, opPct = (i.open||0)/max*100;
    const val = (i.open!==undefined) ? `${i.total} · ${i.open} open` : `${i.total}`;
    return `<div class="row"><div class="lab" title="${esc(i.label)}">${esc(i.label)}</div>
      <div class="track"><div class="fill tot" style="width:${totPct}%;background:${colorFn?colorFn(i.label):'var(--marine)'}"></div>
      ${i.open!==undefined?`<div class="fill open" style="width:${opPct}%"></div>`:''}</div>
      <div class="val">${val}</div></div>`;
  }).join("");
}

function donut(items){
  const total = items.reduce((a,b)=>a+b.count,0)||1;
  const R=52, CX=64, CY=64, circ=2*Math.PI*R;
  let off=0, segs="";
  items.forEach(i=>{
    const frac=i.count/total, len=frac*circ;
    segs+=`<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${C.status[i.label]||'#C4CDD3'}"
      stroke-width="20" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-off}"
      transform="rotate(-90 ${CX} ${CY})"></circle>`;
    off+=len;
  });
  const pct = Math.round((items.find(i=>i.label==="Complete")?.count||0)/total*100);
  const leg = items.map(i=>`<div class="k"><span class="sw" style="background:${C.status[i.label]||'#C4CDD3'}"></span>
    ${esc(i.label)}<span class="c">${i.count}</span></div>`).join("");
  return `<div class="donutwrap"><svg class="donut" width="128" height="128" viewBox="0 0 128 128">
    ${segs}<text x="64" y="60" text-anchor="middle" font-size="26" font-weight="800" fill="#081581">${pct}%</text>
    <text x="64" y="78" text-anchor="middle" font-size="10" fill="#5A6570">complete</text></svg>
    <div class="dlegend">${leg}</div></div>`;
}

function render(d){
  document.getElementById("stamp").textContent =
    d.generated==="placeholder" ? "Sample data" :
    "Updated " + new Date(d.generated).toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"});

  const banner = document.getElementById("banner");
  if(d.generated==="placeholder"){
    banner.innerHTML = `<div class="note ph">Showing sample data — the first GitHub Action refresh will replace this with live tracker numbers.</div>`;
  }
  const k=d.kpis;
  const html = `
  <div class="grid-hero">
    <div class="card">
      <h2>Launch readiness</h2>
      <div class="big">${k.resolvedPct}<span>% resolved</span></div>
      <div class="barout"><div class="barin" style="width:${k.resolvedPct}%"></div></div>
      <div style="font-size:13px;color:var(--muted)">${k.resolved} of ${k.total} work items complete</div>
      <div class="legend">
        ${d.status.map(s=>`<span class="k"><span class="sw" style="background:${C.status[s.label]||'#C4CDD3'}"></span>${esc(s.label)} ${s.count}</span>`).join("")}
      </div>
    </div>
    <div class="card">
      <h2>Needs attention</h2>
      <div class="att">
        <div class="cell crit"><div class="n">${k.openS1}</div><div class="l">Open Mission-Critical (S1)</div></div>
        <div class="cell crit"><div class="n">${k.openS2}</div><div class="l">Open Critical (S2)</div></div>
        <div class="cell warn"><div class="n">${k.totalOpen}</div><div class="l">Total open</div></div>
        <div class="cell mut"><div class="n">${k.unassignedOpen}</div><div class="l">Unassigned & open</div></div>
      </div>
    </div>
  </div>

  <section class="card"><div class="kpis">
    <div class="kpi"><div class="n">${k.total}</div><div class="l">Total items</div></div>
    <div class="kpi"><div class="n">${k.resolved}</div><div class="l">Resolved</div></div>
    <div class="kpi"><div class="n">${k.inProgress}</div><div class="l">In progress</div></div>
    <div class="kpi"><div class="n">${k.notStarted}</div><div class="l">Not started</div></div>
    <div class="kpi"><div class="n">${k.totalOpen}</div><div class="l">Open</div></div>
  </div></section>

  <div class="grid2">
    <section class="card"><h2>Status breakdown</h2>${donut(d.status)}</section>
    <section class="card"><h2>Severity <span class="hint">bar = total · magenta = still open</span></h2>${bars(d.severity, l=>C.sev[l]||'#C4CDD3')}</section>
  </div>

  <div class="grid2">
    <section class="card"><h2>Defects by category</h2>${bars(d.category)}</section>
    <section class="card"><h2>Root-cause layer</h2>${bars(d.rootCause)}</section>
  </div>

  <div class="grid2">
    <section class="card"><h2>Workload by assignee</h2>${bars(d.owner)}</section>
    <section class="card"><h2>Recently resolved <span class="hint">last 7 days</span></h2>
      <ul class="recent">${(d.recent||[]).map(r=>`<li><span>${esc(r.wi)}</span><span class="d">${esc(r.resolved.slice(5))}</span></li>`).join("") || '<li style="color:var(--faint)">None in the last 7 days</li>'}</ul>
    </section>
  </div>

  <section class="card"><h2>Open critical punch list <span class="hint">S1 & S2 not complete — ${d.punch.length} items</span></h2>
    <table><thead><tr><th>Sev</th><th>Work item</th><th>Priority</th><th>Status</th><th>Owner</th></tr></thead>
    <tbody>${d.punch.map(p=>`<tr>
      <td class="sev"><span class="pill ${p.sev==='S1'?'s1':'s2'}">${p.sev}</span></td>
      <td>${esc(p.wi)}</td><td>${esc(p.pri)}</td><td>${esc(p.status)}</td><td>${esc(p.owner)}</td></tr>`).join("")}
    </tbody></table>
  </section>

  <footer>
    Source: <a href="https://app.smartsheet.com/sheets/V4wQxRfwM5927282xP3qfgrcMxFGXJQXhJR83g91" target="_blank" rel="noopener">DSA Work Items Tracker</a>
    · Deltek Customer Learning Experience · auto-refreshed via GitHub Actions
  </footer>`;
  document.getElementById("app").innerHTML = html;
}

fetch("./data.json?cb=" + Date.now())
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e=>{
    document.getElementById("stamp").textContent = "Data unavailable";
    document.getElementById("banner").innerHTML =
      `<div class="note err">Couldn't load <code>data.json</code> (${esc(e.message)}). If you just set this up, the first GitHub Action run hasn't published data yet.</div>`;
  });
</script>
</body>
</html>
